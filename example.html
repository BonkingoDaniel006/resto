    <h2>Formulaire d'inscription </h2>
     <form action="#" method="POST">

            id="nom"
            name="nom"
            required>

    <label for="email">Email:</label>
        <input
            type="email"
            id="email"
            nom="email"
            placeholder="example@gmail.com"
            required>


    <label for="telephone">Téléphone:</label>
        <input
            type="tel"
            id="tel"
            nom="tel"
            pattern="[0-9]{10}"
            required>
    

                </form>
