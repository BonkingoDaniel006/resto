<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bistrot Le Rétro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/contact.css">
</head>

<body>
    <header>
        <div class="logo"><img src="/img/image copy.png" alt=""></div>
        <nav>
            <ul>
                <li><a href="/index.html">Accueil</a></li>
                <li><a href="/menu.html">Menu</a></li>
                <li><a href="#story">Histoire</a></li>
                <li><a href="/reservation.html">Privatisation</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-body">
        <div class="carre1">
            <div class="horaires">
                <h2 style="color: var(--primary-bordeaux); margin-bottom: 1rem;"><i class="far fa-clock"></i> Horaires</h2>
                <p><strong>Mar - Ven :</strong> 12h - 23h</p>
                <p><strong>Sam - Dim :</strong> 11h - 00h</p>
            </div>

            <div class="formulaire">
                <h2 style="color: var(--primary-bordeaux); margin-bottom: 1.5rem;"><i class="far fa-envelope"></i> Nous contacter</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="nom">Nom complet :</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email :</label>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telephone">Téléphone :</label>
                        <input type="tel" id="tel" name="tel" pattern="[0-9]{10}" required>
                    </div>

                    <button type="submit" class="btn-reserve">Envoyer</button>
                </form>
            </div>
            
        </div>
        <div class="carre2">
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d10122.807358528673!2d3.063759836268908!3d50.63265545836597!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c2d58cba3c5387%3A0xe18a835cf07deeae!2sAv.%20du%20Pr%C3%A9sident%20John%20F.%20Kennedy%2C%2059800%20Lille!5e0!3m2!1sfr!2sfr!4v1778052324104!5m2!1sfr!2sfr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </main>

    <footer>
        <div>
            <h4>Contact</h4>
            <p>Av. du Président John F. Kennedy, 59800 Lille</p>
            <div class="socials">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook"></i>
            </div>
        </div>
        <div>
            <p>&copy; 2026 Bistrot le retro. Tous droits réservés.</p>
        </div>
    </footer>
</body>
</html>
